# Gitleaks config — extends default rules.
# NOTE: scanning is from current HEAD forward. Credentials that were committed
# historically must be considered burned and rotated (see docs/audit/AUDIT.md P0-1).
[extend]
useDefault = true

[allowlist]
description = "Known non-secrets"
paths = [
  '''pnpm-lock\.yaml''',
  '''bun\.lock''',
]
regexes = [
  # Documentation placeholders
  '''<from [^>]+>''',
  '''your_[a-z_]+_here''',
]
