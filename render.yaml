# Render Blueprint — https://render.com/docs/blueprint-spec
# Root Directory must be the repo root so the Docker context
# can reach packages/*, apps/*, and workspace config files.

services:
  - type: web
    name: fxbot
    runtime: docker
    dockerfilePath: ./apps/bot/Dockerfile
    dockerContext: .
    plan: starter
    # Liveness only: Render uses this to gate deploys and to restart the
    # service. It must answer 200 whenever the PROCESS can serve traffic.
    # The deep dependency check lives at /api/v1/health (used by the smoke
    # test + monitoring) — pointing Render at it caused a catch-22 on
    # 2026-06-11: DB/Redis env vars were wrong -> deep health 503 -> Render
    # restart-looped the old build AND refused to promote the build that
    # contained the fix.
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # REQUIRED in production (config fail-fast, W-05) — these two were
      # missing from this blueprint, so blueprint-created services
      # crash-looped at config validation until set by hand.
      # Generate both with: openssl rand -hex 32
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: ALCHEMY_RPC_URL
        sync: false
      # Must be the Upstash TCP connection string
      # (rediss://default:<password>@<host>:6379) — NOT the https:// REST URL.
      - key: REDIS_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      # Daily SLO digest target (W-15); digest disabled when unset.
      - key: ADMIN_TELEGRAM_CHAT_ID
        sync: false
      - key: KMS_MASTER_KEY
        sync: false
      - key: SURPLUS_API_KEY
        sync: false
      # CoinGecko demo key for /price (optional — unauthenticated works at lower limits)
      - key: COINGECKO_API_KEY
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: PRIVY_AUTHORIZATION_KEY
        sync: false
