name: Deploy Mini App to Cloudflare Pages

# NOTE: Cloudflare Pages ALSO auto-deploys this project via its Git
# integration. This workflow is the explicit, secrets-driven path; it
# skips cleanly (neutral, not red) when CLOUDFLARE_API_TOKEN is not
# configured so the Git-integration deploy remains the source of truth.

on:
  push:
    branches: [main]
    paths:
      - 'apps/mini-app/**'
      - 'packages/shared/**'
  workflow_dispatch:

# Least-privilege token (W-14).
permissions:
  contents: read

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-cf-token: ${{ steps.check.outputs.has-cf-token }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "has-cf-token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-cf-token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping wrangler deploy (Cloudflare Pages Git integration handles deploys)."
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has-cf-token == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @fxbot/shared build

      - name: Build Mini App
        # Package is @fxaeon/mini-app (the old @fxbot/mini-app filter matched
        # nothing, so wrangler would have shipped a stale/empty dist).
        run: pnpm --filter @fxaeon/mini-app build
        env:
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
          NEXT_PUBLIC_MINI_APP_URL: ${{ secrets.MINI_APP_URL }}
          NEXT_PUBLIC_ALCHEMY_RPC_URL: ${{ secrets.ALCHEMY_RPC_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy apps/mini-app/dist --project-name=fxbot-mini-app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
