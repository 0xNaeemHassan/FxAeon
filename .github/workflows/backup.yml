name: Backup

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 03:00 UTC
  workflow_dispatch:

# Least-privilege token (W-14).
permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # AWS CLI is pre-installed on GitHub runners — no install step needed
      - name: Backup Postgres to R2
        run: |
          pg_dump ${{ secrets.DATABASE_URL }} | gzip | \
          aws s3 cp - s3://fxbot-backups/$(date +%Y%m%d).sql.gz \
            --endpoint-url=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      - name: Prune old backups (30-day retention)
        run: |
          aws s3 ls s3://fxbot-backups \
            --endpoint-url=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto | \
          awk '{print $4}' | sort | head -n -30 | \
          xargs -I {} aws s3 rm s3://fxbot-backups/{} \
            --endpoint-url=https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
