name: Update Visual Snapshots

# Regenerates Playwright visual baselines on CI's Linux/Chromium so they match
# byte-for-byte, then commits them back to the branch. Run this after an
# INTENTIONAL UI change (e.g. settings page now uses dynamic Wallet/Logout
# sections). Trigger manually: Actions → "Update Visual Snapshots" → Run workflow.
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update baselines on'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  update-snapshots:
    name: Regenerate baselines
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @fxaeon/shared build

      - name: Install Playwright Chromium
        run: pnpm --filter @fxaeon/mini-app exec playwright install --with-deps chromium

      - name: Update visual baselines
        run: pnpm --filter @fxaeon/mini-app test:e2e --update-snapshots

      - name: Commit regenerated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain apps/mini-app/e2e/__screenshots__)" ]; then
            git add apps/mini-app/e2e/__screenshots__
            git commit -m "test(mini-app): regenerate Playwright baselines"
            git push origin HEAD:${{ github.event.inputs.branch }}
          else
            echo "No baseline changes."
          fi
