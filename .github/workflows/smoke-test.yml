name: Post-Deploy Smoke Test

on:
  workflow_run:
    workflows: ["Deploy", "Deploy Mini App to Cloudflare Pages"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# Least-privilege token (W-14).
permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Smoke Tests
        run: node smoke-test.js "${{ inputs.environment == 'staging' && secrets.STAGING_URL || secrets.PRODUCTION_URL }}"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MINI_APP_URL: ${{ secrets.MINI_APP_URL }}
          ALCHEMY_RPC_URL: ${{ secrets.ALCHEMY_RPC_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_TOKEN: ${{ secrets.REDIS_TOKEN }}

      - name: Notify on Failure
        if: failure()
        uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3 # v1
        with:
          payload: |
            {
              "text": "fxBot smoke tests failed on ${{ inputs.environment || 'production' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
