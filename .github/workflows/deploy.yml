name: Deploy
# Canonical bot deploy target is RENDER (render.yaml blueprint): Render
# auto-deploys the Docker service from pushes to main — no workflow needed.
# The Mini App deploys to Cloudflare Pages via deploy-mini-app.yml.
# This workflow only runs database migrations, gated behind a repo variable
# so it can be enabled once DATABASE_URL is configured as a secret. (W-14)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_DB_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @fxbot/db db:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
