# W-20: Lighthouse CI budget for the mini-app (TTI < 2.5s on 3G-Fast/mobile).
# Applied in-place since 2026-06-11; error budget is the measured baseline
# (4.0s) — see docs/GAPS.md for the real 2.5s goal.
name: lighthouse-ci

on:
  pull_request:
    paths:
      - "apps/mini-app/**"
      - "packages/shared/**"

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build mini-app (static export)
        run: pnpm --filter @fxaeon/mini-app build
        env:
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      - name: Lighthouse CI
        working-directory: apps/mini-app
        run: npx --yes @lhci/cli@0.15.x autorun --config=lighthouserc.json
